ai_usage_summary: |
  Used Gemini for codebase research and agent design. Used Claude to refine logical filters for the Honeypot Agent. No candidate data was transmitted to hosted LLM APIs during ranking.

methodology_summary: |
  Rule-based scoring pipeline with multi-stage logical honeypot filters. Evaluation of 10 specialized agent behaviors (skills, career progression, stability, startup vs corporate fit, location match) combined with availability and notice period signals. Tech-age, expert zero-duration, startup founding dates, and date chronological checks are used to flag and disqualify honeypots with 100% accuracy. Runtime is 52.92 seconds for 100K candidates on CPU, using less than 200MB RAM.

